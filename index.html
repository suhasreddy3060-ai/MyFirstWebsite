<!DOCTYPE html>
<html>

<head>
    <title>Madhav pvt ltd</title>

    <style>

        .body-style {
            background-color: lightblue;
            text-align: center;
        }

        .main-heading{
    color:rgb(38,38,82);
    font-size:60px;
    text-align:center;
    }
        

        .paragraph {
            font-size: 18px;
        }

        .menu-table {
            margin: 0 auto;
            border-collapse: collapse;
        }

        .table-heading,
        .table-data {
            padding: 10px;
            text-align: left;
        }

        .table-heading {
            background-color: rgb(34, 34, 232);
            color: white;
        }

        .table-data {
            background-color: rgb(241, 237, 237);
        }

        /* FLEXBOX */

        .navbar a{
    text-decoration: none;
    color: black;
    font-weight: bold;
    padding: 10px 20px;
    border-radius: 8px;}

        .button-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        button{
    background-color: rgb(34, 34, 232);
    color: white;
    padding: 10px 20px;
    border-radius: 8px;
    }

    </style>

</head>

<body class="body-style">

    <h1 class="main-heading">Madhav Farm Food</h1>

    <p class="paragraph">Authentic Telugu Food</p>

    <!-- Flexbox Navbar -->
    <div class="navbar">
        <a href="#">Home</a>
        <a href="#">Menu</a>
        <a href="#">Contact</a>
    </div>

    <img src="images/biryani.jpg" width="350" alt="Biryani">

    <h2>Menu</h2>

    <hr>

    <table border="1" class="menu-table">

        <tr>
            <th class="table-heading">Dish</th>
            <th class="table-heading">Price</th>
            <th class="table-heading">Persons</th>
        </tr>

        <tr>
            <td class="table-data">Chicken Biryani</td>
            <td class="table-data">₹250</td>
            <td class="table-data">2</td>
        </tr>

        <tr>
            <td class="table-data">Veg Meals</td>
            <td class="table-data">₹180</td>
            <td class="table-data">1</td>
        </tr>

        <tr>
            <td class="table-data">Fish Fry</td>
            <td class="table-data">₹300</td>
            <td class="table-data">2</td>
        </tr>

    </table>

    <br>

    <input type="text" placeholder="Enter your name">

    <br><br>

    <input type="email" placeholder="Enter your email">

    <br><br>

    <!-- Flexbox Buttons -->
    <div class="button-group">
        <button>Book Table</button>
        <button>Book Now</button>
    </div>

    <br><br>

    <a href="https://www.youtube.com/">
        Visit Our YouTube Channel
    </a>

</body>

</html>
